<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Profil - Smart Door</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f4f6f9; }
        .card { border-radius: 15px; border: none; }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <a href="/" class="btn btn-sm btn-secondary mb-3"><i class="fa-solid fa-arrow-left me-2"></i>Kembali</a>
                <div class="card shadow p-4">
                    <h4 class="fw-bold mb-4"><i class="fa-solid fa-user-shield me-2"></i>Pengaturan Akun</h4>
                    <p class="text-muted">Username: <strong>{{ username }}</strong></p>
                    <p class="text-muted">Role: <span class="badge bg-primary">{{ role | upper }}</span></p>
                    <hr>
                    <h6 class="fw-bold">Ganti Password</h6>
                    <div id="otp-section">
                        <button onclick="sendOTP()" class="btn btn-warning w-100 fw-bold">Kirim OTP ke Email</button>
                    </div>
                    <div id="reset-section" style="display:none;">
                        <input type="text" id="otp-input" class="form-control mb-2" placeholder="Masukkan 6 Digit OTP">
                        <input type="password" id="new-password" class="form-control mb-3" placeholder="Password Baru">
                        <button onclick="updatePassword()" class="btn btn-success w-100 fw-bold">Simpan Password Baru</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
    function sendOTP() {
        fetch('/forgot_password', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ email: "{{ email }}" })
        }).then(() => {
            alert("OTP terkirim ke email Anda!");
            document.getElementById('otp-section').style.display = 'none';
            document.getElementById('reset-section').style.display = 'block';
        });
    }

    function updatePassword() {
        const otp = document.getElementById('otp-input').value;
        const pass = document.getElementById('new-password').value;
        fetch('/update_password', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ otp: otp, new_password: pass })
        }).then(res => {
            if(res.ok) { alert("Password Berhasil Diganti!"); window.location.href = "/"; }
            else alert("OTP Salah!");
        });
    }
    </script>
</body>
</html>
