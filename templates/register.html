<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Registrasi Manajer - Smart Door</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #212529; display: flex; align-items: center; height: 100vh; }
        .card { width: 450px; margin: auto; border-radius: 15px; }
    </style>
</head>
<body>
    <div class="card shadow">
        <div class="card-body p-5 text-center">
            <h3 class="mb-4 fw-bold text-dark">BUAT AKUN MANAJER</h3>
            
            {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}

            {% if step == 'email' %}
            <form method="POST">
                <input type="hidden" name="action" value="send_otp">
                <div class="mb-3 text-start">
                    <label class="form-label text-muted small fw-bold">Pilih Akses Pintu</label>
                    <select name="role" class="form-select" required>
                        <option value="door1">Manajer Pintu 1 (DOOR1)</option>
                        <option value="door2">Manajer Pintu 2 (DOOR2)</option>
                    </select>
                </div>
                <div class="mb-4 text-start">
                    <label class="form-label text-muted small fw-bold">Email Aktif</label>
                    <input type="email" name="email" class="form-control" placeholder="contoh@gmail.com" required>
                </div>
                <button type="submit" class="btn btn-warning w-100 fw-bold">KIRIM KODE OTP</button>
            </form>
            
            {% elif step == 'verify' %}
            <div class="alert alert-info small">Kode OTP 6-angka telah dikirim ke <strong>{{ email }}</strong></div>
            <form method="POST">
                <input type="hidden" name="action" value="verify_otp">
                <input type="text" name="otp" class="form-control mb-3 text-center fw-bold fs-4" placeholder="------" maxlength="6" required>
                <hr>
                <input type="text" name="username" class="form-control mb-3" placeholder="Buat Username Baru" required>
                <input type="password" name="password" class="form-control mb-4" placeholder="Buat Password Baru" required>
                <button type="submit" class="btn btn-success w-100 fw-bold">VERIFIKASI & DAFTAR</button>
            </form>
            {% endif %}
            
            <p class="mt-4 text-muted small"><a href="/login" class="text-decoration-none">Kembali ke Halaman Login</a></p>
        </div>
    </div>
</body>
</html>
