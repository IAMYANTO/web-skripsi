<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Login Admin - Smart Door</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #212529; display: flex; align-items: center; height: 100vh; }
        .card { width: 400px; margin: auto; border-radius: 15px; }
    </style>
</head>
<body>
    <div class="card shadow">
        <div class="card-body p-5 text-center">
            <h3 class="mb-4 fw-bold text-dark">ADMIN LOGIN</h3>
            {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
            <p class="mb-4"><a href="/register" class="text-decoration-none small fw-bold text-primary">Daftar di sini</a></p>
            <form method="POST">
                <input type="text" name="username" class="form-control mb-3" placeholder="Username" required>
                <input type="password" name="password" class="form-control mb-4" placeholder="Password" required>
                <button type="submit" class="btn btn-primary w-100 fw-bold">MASUK</button>
            </form>
            <p class="mt-4 text-muted small">Instrumentation & Control - UNAIR</p>
        </div>
    </div>
</body>
</html>
